app = "nomenclator"
primary_region = "gru"

[build]
dockerfile = "Dockerfile"

[env]
DATABASE_PATH = "/data/nomenclator.db"
STATIC_DIR = "/app/static"

[[mounts]]
source = "nomenclator_data"
destination = "/data"

[vm]
memory = "512mb"
cpu_kind = "shared"
cpus = 1

[http_service]
internal_port = 8080
force_https = true
auto_stop_machines = false
auto_start_machines = true
min_machines_running = 1

[[http_service.checks]]
interval = "30s"
timeout = "5s"
grace_period = "10s"
method = "GET"
path = "/health"
